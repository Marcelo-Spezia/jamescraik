# Making Sense Design System — tema base de Streamlit.
# El look completo (botones pill, cards, inputs, fuente) lo aplica ui/ms_ui.py
# inyectando ui/streamlit_styles.css. Acá van los tokens nativos + static serving.
[theme]
base = "light"
primaryColor = "#0ECC7E"               # Making-green — acentos, foco, selección
backgroundColor = "#FFFFFF"            # blanco
secondaryBackgroundColor = "#F9F9F9"   # grey-50 — sidebar, contenedores
textColor = "#102532"                  # dark-blue — texto principal (nunca negro puro)
font = "Red Hat Display, sans-serif"

[server]
# Sirve las fuentes .ttf y los SVG desde ./static/ en la URL app/static/…
enableStaticServing = true
